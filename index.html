async function cargarFuenteTTF(doc,url,nombreFuente){

  const res =
  await fetch(url);

  const buffer =
  await res.arrayBuffer();

  let binary = "";
  const bytes = new Uint8Array(buffer);

  bytes.forEach(b=>{
    binary += String.fromCharCode(b);
  });

  const base64 =
  btoa(binary);

  doc.addFileToVFS(
    `${nombreFuente}.ttf`,
    base64
  );

  doc.addFont(
    `${nombreFuente}.ttf`,
    nombreFuente,
    "normal"
  );

}

function recalcularTotalPresupuesto(itemsMateriales, itemsColaboradores, itemsProveedores){

  const totalMateriales =
  (itemsMateriales || []).reduce((sum,item)=>
    sum + Number(item.cantidad || 0) * Number(item.precio || 0),
    0
  );

  const totalColaboradores =
  (itemsColaboradores || []).reduce((sum,item)=>
    sum + Number(item.cantidad || 0) * Number(item.precio || 0),
    0
  );

  const totalProveedores =
  (itemsProveedores || []).reduce((sum,item)=>
    sum + Number(item.cantidad || 0) * Number(item.precio || 0),
    0
  );

  return totalMateriales + totalColaboradores + totalProveedores;

}

async function guardarPresupuestoInterno(){

  if(
    !presupuestoEditando.cliente ||
    String(presupuestoEditando.cliente).trim() === ""
  ){

    return;

    !presupuestoEditando.fecha ||
    String(presupuestoEditando.fecha).trim() === ""

  const materialesActuales =
  presupuestoEditando.materiales || [];

  presupuestoEditando.checklist || [];

  materialesActuales.map(item=>{

    `${item.cantidad}x ${item.nombre}`;

    const existente =
    checklistActual.find(ch=>
      ch.material_id &&
      String(ch.material_id) === String(item.id)
    ) ||
    checklistActual.find(ch=>
      ch.label === label
    );

    return {
      id:existente?.id || `m-${Date.now()}-${Math.random().toString(36).slice(2)}`,
      material_id:item.id || existente?.material_id || "",
      label,
      ready:existente?.ready || false,

      cargado:existente?.cargado || false,
      enviado:existente?.enviado || Number(item.cantidad || 1),
      recibido:existente?.recibido || "",
      regreso_ok:existente?.regreso_ok || false,
      regreso_detalle:existente?.regreso_detalle || "",
      stock_devuelto:existente?.stock_devuelto || false
    };

  });

  const payload = {
  cliente:presupuestoEditando.cliente.trim(),
  fecha:presupuestoEditando.fecha,
  salon:presupuestoEditando.salon || null,
  numero:presupuestoEditando.numero
    ? Number(presupuestoEditando.numero)
    : proximoNumeroPresupuesto(),
  materiales:materialesActuales,
  checklist:checklistNuevo,
  colaboradores:presupuestoEditando.colaboradores || [],
  proveedores:presupuestoEditando.proveedores || [],
  total:Number(presupuestoEditando.total || 0),
  estado:presupuestoEditando.estado || "pendiente",
  etapa:presupuestoEditando.etapa || "pendiente_preparacion",
  archivado:presupuestoEditando.archivado || false
};

  let res;

if(presupuestoEditando.id){

  res = await db
  .from("presupuestos")
  .update(payload)
  .eq("id",presupuestoEditando.id);

}else{

  res = await db
  .from("presupuestos")
  .insert(payload);

}

if(res.error){
  alert("No se pudo guardar el presupuesto.");
  console.error(res.error.message);
  return;
}

  setModalPresupuesto(false);
  setPresupuestoEditando(null);
  cargarTodo();

}

function fechaKey(fecha){
  return fecha ? String(fecha).slice(0,10) : "";
}


function stockDisponible(materialId,fecha){

  const material =
  materiales.find(m=>
    String(m.id) === String(materialId)
  );

  const stockTotal =
  Number(material?.stock || 0);

  const reservado =
  presupuestos
  .filter(p=>

    p.estado === "aceptado" &&

    fechaKey(p.fecha) === fechaKey(fecha)

  )
  .reduce((sum,p)=>{

    return sum +

    (p.materiales || [])
    .filter(mat=>
      String(mat.id) === String(materialId)
    )
    .reduce((s,mat)=>

      s + Number(mat.cantidad || 0)

    ,0);

  },0);

  return stockTotal - reservado;

}

  async function cargarTodo() {
    try {
      const [mRes, pRes, cRes, pvRes, fRes] = await Promise.all([
        db.from("materiales").select("*").order("nombre"),
        db.from("presupuestos").select("*").order("fecha", { ascending: true }),
        db.from("colaboradores").select("*").order("nombre"),
        db.from("proveedores").select("*").order("nombre"),
        db.from("presupuestos_formales").select("*").order("id", { ascending: false })
      ]);
      if (mRes.data) setMateriales(mRes.data);
      if (pRes.data) {
        setPresupuestos(pRes.data);
        setEventosCalendario(pRes.data.map(p => ({
          id: p.id,
          title: `${p.cliente || "Evento"} • ${p.estado || "Pendiente"}`,
          start: p.fecha,
          allDay: true
        })));
      }
      if (cRes.data) setColaboradores(cRes.data);
      if (pvRes.data) setProveedores(pvRes.data);
      if (fRes.data) setPresupuestosFormales(fRes.data);
    } catch (err) { console.error(err); }
  }

function recalcularTotalFormal(items, colaboradoresLista, proveedoresLista){

  const totalItems =
  (items || []).reduce((sum,item)=>
    sum + Number(item.cantidad || 0) * Number(item.precio || 0),
    0
  );

  const totalColaboradores =
  (colaboradoresLista || []).reduce((sum,item)=>
    sum + Number(item.cantidad || 0) * Number(item.precio || 0),
    0
  );

  const totalProveedores =
  (proveedoresLista || []).reduce((sum,item)=>
    sum + Number(item.cantidad || 0) * Number(item.precio || 0),
    0
  );

  return totalItems + totalColaboradores + totalProveedores;

}

        {/* MODAL IMPORTAR DESDE INTERNO */}
        {modalImportar && (
          <div className="modalOverlay" onClick={() => setModalImportar(false)}>
            <div className="modalContent" style={{ maxWidth: 700 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <div>
                  <div className="title">Importar Presupuesto</div>
                  <div className="subtitle">Seleccioná un presupuesto interno</div>
                </div>
                <button className="btn btn-danger" onClick={() => setModalImportar(false)}>✕</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {presupuestos.length === 0 && <div className="empty">No hay presupuestos internos</div>}
                {presupuestos.map(p => (
                  <div key={p.id} className="card" style={{ padding: 18, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div className="cliente">{p.cliente}</div>
                      <div style={{ marginTop: 6, opacity: .7, fontSize: 14 }}>{p.fecha} • ${Number(p.total || 0).toLocaleString()}</div>
                    </div>
                    <button className="btn btn-green" onClick={() => importarDesdeInterno(p)}>Importar</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* MODAL EVENTOS DE FECHA (calendario) */}
        {modalEventosFecha && (
          <div className="modalOverlay" onClick={() => setModalEventosFecha(false)}>
            <div className="modalContent" style={{ maxWidth: 700 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <div>
                  <div className="title">Eventos del Día</div>
                  <div className="subtitle">Presupuestos y estados</div>
                </div>
                <button className="btn btn-danger" onClick={() => setModalEventosFecha(false)}>✕</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {eventosFecha.length === 0 && <div className="empty">No hay eventos para este día</div>}
                {eventosFecha.map(ev => (
                  <div key={ev.id} className="card" style={{ padding: 20 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                      <div>
                        <div className="cliente">{ev.cliente}</div>
                        <div style={{ marginTop: 6, opacity: .7, fontSize: 14 }}>{ev.fecha}</div>
                      </div>
                      <div style={{ padding: "10px 18px", borderRadius: 999, fontWeight: 700, background: ev.etapa === "preparado" ? "#22c55e" : "rgba(185,133,88,.12)", color: ev.etapa === "preparado" ? "#fff" : "#b98558" }}>
                        {ev.etapa === "preparado" ? "✔ Preparado" : ev.estado || "Pendiente"}
                      </div>
                    </div>
                    <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                      <div><strong>Salón:</strong> <span style={{ opacity: .8 }}>{ev.salon || "-"}</span></div>
                      <div><strong>Total:</strong> <span style={{ color: "#b98558", fontWeight: 700 }}>${Number(ev.total || 0).toLocaleString()}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}


{modalKarinaBuscar && (

<div
  className="modalOverlay"
  onClick={()=>
    setModalKarinaBuscar(false)
  }
>

  <div
    className="modalContent"
    style={{maxWidth:900}}
    onClick={e=>e.stopPropagation()}
  >

    <div className="title">
      Seleccionar Presupuesto
    </div>

    <input
      className="input"
      placeholder="Buscar cliente..."
      value={busquedaKarina}
      onChange={e=>
        setBusquedaKarina(
          e.target.value
        )
      }
    />

    <div
      style={{
        marginTop:20,
        display:"flex",
        flexDirection:"column",
        gap:12
      }}
    >

      {presupuestos

      .sort((a,b)=>
        new Date(b.fecha) -
        new Date(a.fecha)
      )

      .filter(p=>

        (p.cliente||"")
        .toLowerCase()
        .includes(
          busquedaKarina.toLowerCase()
        )

      )

      .map(p=>(

        <div
          key={p.id}
          className="card"
          style={{
            display:"flex",
            justifyContent:"space-between",
            alignItems:"center"
          }}
        >

          <div>

            <div className="cliente">
              {p.cliente}
            </div>

            <div>
              {p.fecha}
            </div>

          </div>

          <button
            className="btn btn-green"
            onClick={()=>
              seleccionarPresupuestoKarina(p)
            }
          >
            Seleccionar
          </button>

        </div>

      ))}

    </div>

  </div>

</div>

)}




        {/* PREVIEW IMAGEN */}
        {imagenPreview && (
          <div className="modal" onClick={() => setImagenPreview(null)}>
            <div style={{ maxWidth: "90vw", maxHeight: "90vh" }}>
              <img src={imagenPreview} style={{ maxWidth: "100%", maxHeight: "90vh", borderRadius: 28, display: "block" }} />
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

if ("serviceWorker" in navigator) {

  window.addEventListener("load", ()=>{

    navigator.serviceWorker
      .register("./service-worker.js");

  });

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
