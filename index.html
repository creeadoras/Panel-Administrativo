async function eliminarMaterial(material){

  const confirmado =

  const {

function materialAfectadoEnPresupuestos(material){

  return presupuestos
  .map(p=>{

    const items =
    (p.checklist || [])
    .filter(item=>{

      const itemMaterialId =
      item.material_id ||
      item.id_material ||
      item.materialId ||
      item.id;

      const coincidePorId =
      String(itemMaterialId) === String(material.id);

      const coincidePorNombre =
      normalizarTexto(item.label)
      .includes(
        normalizarTexto(material.nombre)
      );

      return coincidePorId || coincidePorNombre;

    });

    if(items.length === 0){
      return null;
    }

    return {
      presupuesto:p,
      items
    };

  })
  .filter(Boolean);

}

function materialesFiltrados(){

  const busqueda =
  normalizarTexto(busquedaMaterial.trim());

  if(!busqueda){
    return [];
  }

  return materiales.filter(m=>
    normalizarTexto(m.nombre).includes(busqueda) ||
    normalizarTexto(m.stock).includes(busqueda)
  );

}


function normalizarTexto(texto){

  return String(texto || "")
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"");

}

function presupuestosFiltrados(){

  const busqueda =
  normalizarTexto(busquedaPresupuesto);

  if(!busqueda){
    return presupuestos;
  }

  return presupuestos.filter(p=>
    normalizarTexto(p.cliente).includes(busqueda) ||
    normalizarTexto(p.estado).includes(busqueda) ||
    normalizarTexto(p.fecha).includes(busqueda)
  );

}

function mesPresupuesto(fecha){

  if(!fecha){
    return "Sin fecha";
  }

  const date =
  new Date(fecha + "T00:00:00");

  return date.toLocaleDateString(
    "es-AR",
    {
      month:"long",
      year:"numeric"
    }
  );

}

function presupuestosAgrupadosPorMes(){

  return presupuestosFiltrados()
  .reduce((grupos,p)=>{

    const mes =
    mesPresupuesto(p.fecha);

    if(!grupos[mes]){
      grupos[mes] = [];
    }

    grupos[mes].push(p);

    return grupos;

  },{});

}


function cantidadItem(item){

  if(item.cantidad){
    return Number(item.cantidad);
  }

  const match =
  String(item.label || "").match(/^(\d+)x\s/i);

  return match ? Number(match[1]) : 1;

}

function materialIdItem(item){

  if(item.material_id){
    return item.material_id;
  }

  if(item.id && !String(item.id).startsWith("extra-")){
    return item.id;
  }

function actualizarItemControl(idx,cambios){

  setControlModal(prev=>{

    if(!prev){
      return prev;
    }

    const checklist =
    (prev.presupuesto.checklist || [])
    .map((item,index)=>
      index === idx
      ? {
          ...item,
          ...cambios
        }
      : item
    );

    return {
      ...prev,
      presupuesto:{
        ...prev.presupuesto,
        checklist
      }
    };

  });

}

function actualizarPresupuestoLocal(id,cambios){

  setPresupuestos(prev=>
    ordenarPresupuestos(
      prev.map(p=>
        p.id === id
        ? {
            ...p,
            ...cambios
          }
        : p
      )
    )
  );

}

async function guardarChecklistPresupuesto(
  presupuesto,
  nuevoChecklist,
  cambiosExtra={}
){

  actualizarPresupuestoLocal(
    presupuesto.id,
    {
      checklist:nuevoChecklist,
      ...cambiosExtra
    }
  );

  const {
    error
  } = await db
  .from("presupuestos")
  .update({
    checklist:nuevoChecklist,
    ...cambiosExtra
  })
  .eq("id",presupuesto.id);

  if(error){

    console.error(
      "Error guardando presupuesto:",
      error.message
    );

    actualizarPresupuestoLocal(
      presupuesto.id,
      presupuesto
    );

    return false;

  }

  return true;

}

  }

}

async function devolverStockSiCorresponde(checklist){

  const itemsADevolver =
  checklist.filter(item=>
    item.regreso_ok &&
    !item.stock_devuelto
  );

  for(const item of itemsADevolver){

    const materialId =
    materialIdItem(item);

    if(!materialId){
      continue;
    }

    const material =
    materiales.find(m=>
      String(m.id) === String(materialId)
    );

    if(!material){
      continue;
    }

    const cantidad =
    Number(item.recibido || cantidadItem(item));

    const nuevoStock =
    Number(material.stock || 0) + cantidad;

    const {
      error
    } = await db
    .from("materiales")
    .update({
      stock:nuevoStock
    })
    .eq("id",material.id);

    if(!error){

      setMateriales(prev=>
        prev.map(m=>
          m.id === material.id
          ? {
              ...m,
              stock:nuevoStock
            }
          : m
        )
      );

    }

  }

  return checklist.map(item=>
    item.regreso_ok && !item.stock_devuelto
    ? {
        ...item,
        stock_devuelto:true
      }
    : item
  );

}

async function guardarControlRegreso(){

  if(!controlModal){
    return;
  }

  const presupuesto =
  controlModal.presupuesto;

  let checklist =
  presupuesto.checklist || [];

  const todoCorrecto =
  checklist.length > 0 &&
  checklist.every(item=>item.regreso_ok);

  if(todoCorrecto){

    checklist =
    await devolverStockSiCorresponde(checklist);

  }

  const estado =
  todoCorrecto
  ? "devuelto_correcto"
  : "regreso_con_observaciones";

  const ok =
  await guardarChecklistPresupuesto(
    presupuesto,
    checklist,
    {
      estado
    }
  );

  if(ok){
    cerrarControl();
  }

}

async function agregarMaterialAlChecklist(presupuesto){

  const materialId =
  materialExtra[presupuesto.id];

  const cantidad =
  Number(cantidadExtra[presupuesto.id] || 1);

  if(!materialId){
    return;
  }

  const material =
  materiales.find(m=>
    String(m.id) === String(materialId)
  );

  if(!material){
    return;
  }

  const nuevoItem = {
    id:`extra-${material.id}-${Date.now()}`,
    material_id:material.id,
    label:`${cantidad}x ${material.nombre}`,
    ready:false,
    comentario:""
  };

  const nuevoChecklist = [
    ...(presupuesto.checklist || []),
    nuevoItem
  ];

  setPresupuestos(prev=>
    ordenarPresupuestos(
      prev.map(p=>
        p.id === presupuesto.id
        ? {
            ...p,
            checklist:nuevoChecklist
          }
        : p
      )
    )
  );

  const {
    error
  } = await db
  .from("presupuestos")
  .update({
    checklist:nuevoChecklist
  })
  .eq("id",presupuesto.id);

  if(error){

    console.error(
      "Error agregando material al checklist:",
      error.message
    );

    setPresupuestos(prev=>
      ordenarPresupuestos(
        prev.map(p=>
          p.id === presupuesto.id
          ? presupuesto
          : p
        )
      )
    );

    return;

  }

  setMaterialExtra(prev=>({
    ...prev,
    [presupuesto.id]:""
  }));

  setCantidadExtra(prev=>({
    ...prev,
    [presupuesto.id]:1
  }));

}


function obtenerNombreMaterial(item){

  if(typeof item === "string"){
    return item;
  }

  if(item.nombre){
    return item.nombre;
  }

  const materialId =
  item.material_id ||
  item.materialId ||
  item.id_material ||
  item.id;

  const material =
  materiales.find(m=>
    Number(m.id) === Number(materialId)
  );

  return material?.nombre || "Material sin nombre";

}



function ordenarPresupuestos(lista=[]){

  return [...lista].sort((a,b)=>{

    const fechaA = new Date(a.fecha || "9999-12-31");
    const fechaB = new Date(b.fecha || "9999-12-31");

    if(fechaA.getTime() !== fechaB.getTime()){
      return fechaA - fechaB;
    }

    return Number(a.id || 0) - Number(b.id || 0);

  });

}

async function guardarMaterial(){

  if(!materialEditando){
    return;
  }

  setGuardandoMaterial(true);

  let imagenUrl =
  materialForm.imagen;

  if(imagenMaterialFile){

    const extension =
    imagenMaterialFile.name.split(".").pop();

    const nombreBase =
    materialEditando.id || `nuevo-${Date.now()}`;

    const nombreArchivo =
    `materiales/${nombreBase}-${Date.now()}.${extension}`;

    const {
      error:uploadError
    } = await db.storage
    .from("imagenes")
    .upload(nombreArchivo,imagenMaterialFile,{
      cacheControl:"3600",
      upsert:true
    });

    if(uploadError){

      console.error(
        "Error subiendo imagen:",
        uploadError.message
      );

      setGuardandoMaterial(false);
      return;

    }

    const {
      data:publicData
    } = db.storage
    .from("imagenes")
    .getPublicUrl(nombreArchivo);

    imagenUrl =
    publicData.publicUrl;

  }

  const materialGuardado = {
    nombre:materialForm.nombre,
    stock:Number(materialForm.stock || 0),
    imagen:imagenUrl
  };

  let respuesta;

  if(materialEditando.id){

    respuesta =
    await db
    .from("materiales")
    .update(materialGuardado)
    .eq("id",materialEditando.id)
    .select()
    .single();

  }else{

    respuesta =
    await db
    .from("materiales")
    .insert(materialGuardado)
    .select()
    .single();

  }

  setGuardandoMaterial(false);

  if(respuesta.error){

    console.error(
      "Error guardando material:",
      respuesta.error.message
    );

    return;

  }

  if(materialEditando.id){

    setMateriales(prev=>
      prev.map(m=>
        m.id === materialEditando.id
        ? respuesta.data
        : m
      )
    );

  }else{

    setMateriales(prev=>[
      respuesta.data,
      ...prev
    ]);

  }

  cerrarModalMaterial();

}



  function calcularProgreso(

checklist.filter(

                onClick={()=>
                  eliminarEmpresa(e)
                }
              >
                Eliminar
              </button>

            </div>

          </div>

        ))

      )}

    </div>

  </>

)}




{section==="eventos" && (

  <>

    <div className="page-title">
      Eventos
    </div>

    <div className="cards-grid">

      {presupuestos.length === 0 ? (

        <div className="stat-card">
          No hay eventos cargados.
        </div>

      ) : (

        presupuestos.map(p=>(

          <div
            className="event-card"
            key={p.id}
          >

            <div className="event-date">
              {p.fecha || "Sin fecha"}
            </div>

            <div className="event-client">
              {p.cliente || "Cliente sin nombre"}
            </div>

            {p.estado && (
              <div className="badge">
                {p.estado}
              </div>
            )}

          </div>

        ))

      )}

    </div>

  </>

)}



{materialEditando && (

  <div className="modal-backdrop">

    <div className="modal">

      <div className="modal-header">

        <h2>
  {
    materialEditando.id
    ? "Editar material"
    : "Agregar material"
  }
</h2>

        <button
          className="modal-close"
          onClick={cerrarModalMaterial}
        >
          ×
        </button>

      </div>

      <label className="form-field">
        Nombre

        <input
          value={materialForm.nombre}
          onChange={e=>
            setMaterialForm({
              ...materialForm,
              nombre:e.target.value
            })
          }
        />

      </label>

      <label className="form-field">
        Stock

        <input
          type="number"
          value={materialForm.stock}
          onChange={e=>
            setMaterialForm({
              ...materialForm,
              stock:e.target.value
            })
          }
        />

      </label>

      <div className="form-field">

  <span>
    Imagen
  </span>

  {imagenMaterialPreview && (
    <img
      src={imagenMaterialPreview}
      className="material-img"
    />
  )}

  <label className="upload-btn">

    Subir nueva imagen

    <input
      type="file"
      accept="image/*"
      onChange={seleccionarImagenMaterial}
    />

  </label>

</div>

      {materialForm.imagen && (
        <img
          src={materialForm.imagen}
          className="material-img"
        />
      )}

      <div className="actions">

        <button
          className="btn"
          onClick={cerrarModalMaterial}
        >
          Cancelar
        </button>

        <button
          className="btn green"
          onClick={guardarMaterial}
          disabled={guardandoMaterial}
        >
          {
            guardandoMaterial
            ? "Guardando..."
            : "Guardar"
          }
        </button>

      </div>

    </div>

  </div>

)}



{controlModal && (

  <div className="modal-backdrop">

    <div className="modal wide">

      <div className="modal-header">

        <h2>
          {
            controlModal.tipo === "carga"
            ? "Control de carga"
            : "Control de regreso"
          }
        </h2>

        <button
          className="modal-close"
          onClick={cerrarControl}
        >
          ×
        </button>

      </div>

      <div className="control-list">

        {(controlModal.presupuesto.checklist || [])
        .map((item,idx)=>(

          <div
            className="control-row"
            key={item.id || idx}
          >

            <div className="control-row-title">
              {item.label}
            </div>

            {controlModal.tipo === "carga" && (

              <label>

                <span>
                  Cargado para el evento
                </span>

                <input
                  type="checkbox"
                  checked={!!item.cargado}
                  onChange={e=>
                    actualizarItemControl(
                      idx,
                      {
                        cargado:e.target.checked
                      }
                    )
                  }
                />

              </label>

            )}

            {controlModal.tipo === "regreso" && (

              <>

                <div className="control-grid">

                  <label>
                    Enviado

                    <input
                      type="number"
                      min="0"
                      value={item.enviado || cantidadItem(item)}
                      onChange={e=>
                        actualizarItemControl(
                          idx,
                          {
                            enviado:Number(e.target.value)
                          }
                        )
                      }
                    />

                  </label>

                  <label>
                    Recibido

                    <input
                      type="number"
                      min="0"
                      value={item.recibido || ""}
                      onChange={e=>{

                        const recibido =
                        Number(e.target.value);

                        const enviado =
                        Number(item.enviado || cantidadItem(item));

                        actualizarItemControl(
                          idx,
                          {
                            recibido,
                            regreso_ok:recibido === enviado
                          }
                        );

                      }}
                    />

                  </label>

                </div>

                <label>

                  <span>
                    Volvió correctamente
                  </span>

                  <input
                    type="checkbox"
                    checked={!!item.regreso_ok}
                    onChange={e=>{

                      const enviado =
                      Number(item.enviado || cantidadItem(item));

                      actualizarItemControl(
                        idx,
                        {
                          regreso_ok:e.target.checked,
                          recibido:e.target.checked
                          ? enviado
                          : (item.recibido || "")
                        }
                      );

                    }}
                  />

                </label>

                {!item.regreso_ok && (

                  <label>
                    Detalle si volvió menos o con problema

                    <textarea
                      value={item.regreso_detalle || ""}
                      onChange={e=>
                        actualizarItemControl(
                          idx,
                          {
                            regreso_detalle:e.target.value
                          }
                        )
                      }
                    />

                  </label>

                )}

                {item.stock_devuelto && (
                  <div className="badge">
                    Stock ya devuelto
                  </div>
                )}

              </>

            )}

          </div>

        ))}

      </div>

      <div className="actions">

        <button
          className="btn"
          onClick={cerrarControl}
        >
          Cancelar
        </button>

        <button
          className="btn green"
          onClick={
            controlModal.tipo === "carga"
            ? guardarControlCarga
            : guardarControlRegreso
          }
        >
          Guardar progreso
        </button>

      </div>

    </div>

  </div>

)}



{imagenAmpliada && (

  <div
    className="image-viewer"
    onClick={()=>
      setImagenAmpliada(null)
    }
  >

    <button
      className="image-viewer-close"
      onClick={()=>
        setImagenAmpliada(null)
      }
    >
      ×
    </button>

    <img
      src={imagenAmpliada}
      className="image-viewer-img"
    />

  </div>

)}

{modalProveedor && proveedorEditando && (

  <div
    className="modal"
    onClick={()=>
      setModalProveedor(false)
    }
  >

    <div
      className="modal-box"
      style={{ maxWidth:500 }}
      onClick={e=>e.stopPropagation()}
    >

      <div className="flex-between">

        <div style={{ fontSize:22, fontWeight:800 }}>
          {
            proveedorEditando.id
            ? "Editar Empresa"
            : "Nueva Empresa"
          }
        </div>

        <button
          className="btn btn-danger"
          onClick={()=>
            setModalProveedor(false)
          }
        >
          ✕
        </button>

      </div>

      <label>Nombre de empresa</label>
      <input
        value={proveedorEditando.nombre || ""}
        onChange={e=>
          setProveedorEditando({
            ...proveedorEditando,
            nombre:e.target.value
          })
        }
      />

      <label>Teléfono</label>
      <input
        value={proveedorEditando.telefono || ""}
        onChange={e=>
          setProveedorEditando({
            ...proveedorEditando,
            telefono:e.target.value
          })
        }
      />

      <label>Servicio</label>
      <input
        value={proveedorEditando.servicio || ""}
        onChange={e=>
          setProveedorEditando({
            ...proveedorEditando,
            servicio:e.target.value
          })
        }
      />

      <label>Precio</label>
      <input
        type="number"
        value={proveedorEditando.precio || 0}
        onChange={e=>
          setProveedorEditando({
            ...proveedorEditando,
            precio:e.target.value
          })
        }
      />

      <div style={{
        display:"flex",
        justifyContent:"flex-end",
        gap:12,
        marginTop:28
      }}>

        <button
          className="btn btn-ghost"
          onClick={()=>
            setModalProveedor(false)
          }
        >
          Cancelar
        </button>

        <button
          className="btn btn-primary"
          onClick={guardarProveedor}
        >
          Guardar
        </button>

      </div>

    </div>

  </div>

)}



      </main>

    </div>

  );

}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App/>);

</script>

</body>
</html>
